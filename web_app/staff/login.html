<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login — Medical Drone Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0C0F12;
    --bg-card: #181D22;
    --hairline: #262C32;
    --text: #F2EFE9;
    --text-dim: #9098A0;
    --text-faint: #5C636B;
    --flare: #FF6A3D;
    --flare-dim: #C7491F;
    --locked: #4BC9A0;
    --danger: #E5535A;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
  }

  body {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 600px 400px at 50% 0%, rgba(255,106,61,0.07), transparent 70%);
    pointer-events: none;
  }

  .topbar {
    position: relative;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 36px;
  }
  .topbar .bar { width: 5px; height: 5px; border-radius: 50%; background: var(--flare); }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 360px;
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    padding: 32px 28px;
  }

  h1 {
    font-family: 'Archivo Expanded', sans-serif;
    font-weight: 800;
    font-size: 22px;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }

  .desc {
    color: var(--text-dim);
    font-size: 13.5px;
    margin: 0 0 26px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 7px;
    letter-spacing: 0.02em;
  }

  .field { margin-bottom: 18px; }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--hairline);
    border-radius: 11px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    padding: 12px 14px;
  }

  input:focus { outline: none; border-color: var(--flare-dim); }
  input::placeholder { color: var(--text-faint); }

  button {
    width: 100%;
    margin-top: 6px;
    padding: 13px;
    border: none;
    border-radius: 11px;
    background: linear-gradient(180deg, var(--flare), var(--flare-dim));
    color: #fff;
    font-family: 'Archivo Expanded', sans-serif;
    font-weight: 800;
    font-size: 14.5px;
    letter-spacing: 0.02em;
    cursor: pointer;
    box-shadow: 0 10px 24px -10px rgba(255,106,61,0.5);
    transition: transform 0.12s ease;
  }

  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .error {
    display: none;
    margin-top: 14px;
    padding: 11px 14px;
    background: rgba(229, 83, 90, 0.1);
    border: 1px solid rgba(229, 83, 90, 0.35);
    border-radius: 10px;
    color: var(--danger);
    font-size: 13px;
  }
  .error.show { display: block; }

  .footer-note {
    margin-top: 22px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    text-align: center;
  }
</style>
</head>
<body>

  <div class="topbar"><span class="bar"></span><span class="eyebrow">Medical Drone Network</span></div>

  <div class="card">
    <h1>Dispatcher login</h1>
    <p class="desc">Sign in to view incoming rescue requests and dispatch the drone.</p>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="staff" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" id="loginBtn">Sign in</button>
      <div class="error" id="errorBox">Invalid username or password.</div>
    </form>
  </div>

  <div class="footer-note">AUTHORIZED PERSONNEL ONLY</div>

<script>
  const RELAY_HTTP = "https://uav-rescue-relay.onrender.com";

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");
    const errorBox = document.getElementById("errorBox");

    btn.disabled = true;
    btn.textContent = "Signing in…";
    errorBox.classList.remove("show");

    try {
      const res = await fetch(`${RELAY_HTTP}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });

      if (!res.ok) throw new Error("Invalid credentials");

      const data = await res.json();
      sessionStorage.setItem("staff_token", data.token);
      sessionStorage.setItem("staff_username", data.username);
      sessionStorage.setItem("staff_role", data.role);
      window.location.href = data.role === "admin" ? "admin.html" : "dashboard.html";
    } catch (err) {
      errorBox.classList.add("show");
      btn.disabled = false;
      btn.textContent = "Sign in";
    }
  });
</script>
</body>
</html>
